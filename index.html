<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot vs UFOs - GitHub Project</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #020202; /* Nesten helt svart */
            overflow: hidden;
            color: #00ffcc; /* Sci-fi cyan */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }
        h2 { margin: 0 0 5px 0; font-size: 28px; text-transform: uppercase; letter-spacing: 3px;}
        p { margin: 0; font-size: 14px; color: #ccc;}
    </style>
</head>
<body>

    <div id="ui">
        <h2>Poeng: <span id="score">0</span></h2>
        <p>Bruk WASD for å flytte, KLIKK for å skyte</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let mouseX = 0;
        let mouseY = 0;

        // --- SPRITES ---
        const robotSprite = new Image();
        robotSprite.src = 'robot.png'; 

        const ufoSprite = new Image();
        ufoSprite.src = 'ufo.png';

        const bulletSprite = new Image();
        bulletSprite.src = 'bullet.png';

        // --- BAKGRUNN (STJERNER) ---
        // Genererer en liste med stjerner én gang
        const stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                opacity: Math.random()
            });
        }

        function drawBackground() {
            // Tegner bakgrunnsfargen (svart)
            ctx.fillStyle = '#020202';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Tegner alle stjernene
            ctx.fillStyle = 'white';
            stars.forEach(star => {
                ctx.globalAlpha = star.opacity; // Gjør stjernene litt gjennomsiktige
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0; // Tilbakestiller opacity
        }


        // --- INPUT ---
        const keys = {
            w: false, a: false, s: false, d: false
        };

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key.toLowerCase())) {
                keys[e.key.toLowerCase()] = true;
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key.toLowerCase())) {
                keys[e.key.toLowerCase()] = false;
            }
        });

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });


        // --- KLASSER ---

        class Player {
            constructor(x, y, width, height, speed) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.speed = speed;
                this.angle = 0;
            }

            draw() {
                this.angle = Math.atan2(mouseY - this.y, mouseX - this.x);

                ctx.save();
                ctx.translate(this.x, this.y);
                // Justerer rotasjonen (PI/2) slik at roboten peker mot musa
                ctx.rotate(this.angle + Math.PI / 2); 
                
                if (robotSprite.complete) {
                    ctx.drawImage(robotSprite, -this.width / 2, -this.height / 2, this.width, this.height);
                } else {
                    ctx.fillStyle = '#00ffcc';
                    ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
                }
                
                ctx.restore();
            }

            update() {
                if (keys.w && this.y > this.height/2) this.y -= this.speed;
                if (keys.s && this.y < canvas.height - this.height/2) this.y += this.speed;
                if (keys.a && this.x > this.width/2) this.x -= this.speed;
                if (keys.d && this.x < canvas.width - this.width/2) this.x += this.speed;

                this.draw();
            }
        }

        class Projectile {
            constructor(x, y, width, height, color, velocity) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.color = color;
                this.velocity = velocity;
                this.angle = Math.atan2(velocity.y, velocity.x);
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle + Math.PI / 2);

                if (bulletSprite.complete) {
                    // Justerer kulen litt så den ser ut som den kommer fra midten
                    ctx.drawImage(bulletSprite, -this.width / 2, -this.height / 2, this.width, this.height);
                } else {
                    ctx.fillStyle = this.color;
                    ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
                }
                ctx.restore();
            }
            update() {
                this.draw();
                this.x += this.velocity.x;
                this.y += this.velocity.y;
            }
        }

        class Enemy {
            constructor(x, y, width, height, speed) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.speed = speed;
            }
            draw() {
                if (ufoSprite.complete) {
                    ctx.drawImage(ufoSprite, this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);
                } else {
                    ctx.fillStyle = 'red';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.width/2, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            update() {
                this.draw();
                // Enkel AI
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(angle) * this.speed;
                this.y += Math.sin(angle) * this.speed;
            }
        }


        // --- SPILL OBJEKTER ---
        // Roboten er gjort litt større (70x70) for å vise detaljene.
        let player = new Player(canvas.width / 2, canvas.height / 2, 70, 70, 6);
        
        let projectiles = [];
        let enemies = [];

        function spawnEnemies() {
            setInterval(() => {
                const width = 60; // UFO størrelse
                const height = 45;
                let enemyX, enemyY;

                if (Math.random() < 0.5) {
                    enemyX = Math.random() < 0.5 ? 0 - width : canvas.width + width;
                    enemyY = Math.random() * canvas.height;
                } else {
                    enemyX = Math.random() * canvas.width;
                    enemyY = Math.random() < 0.5 ? 0 - height : canvas.height + height;
                }

                // Litt mer tilfeldig fart
                const speed = Math.random() * (2.5 - 0.8) + 0.8;

                enemies.push(new Enemy(enemyX, enemyY, width, height, speed));
            }, 1200); // Spawner litt oftere
        }

        let animationId;
        function animate() {
            animationId = requestAnimationFrame(animate);
            
            // Tegner bakgrunnen med stjerner
            drawBackground();
            
            // Legger til en lett "motion blur" effekt
            ctx.fillStyle = 'rgba(2, 2, 2, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            player.update();

            projectiles.forEach((projectile, index) => {
                projectile.update();
                // Fjern kuler utenfor skjerm
                if (projectile.x + projectile.width < 0 || projectile.x - projectile.width > canvas.width || 
                    projectile.y + projectile.height < 0 || projectile.y - projectile.height > canvas.height) {
                    setTimeout(() => projectiles.splice(index, 1), 0);
                }
            });

            enemies.forEach((enemy, enemyIndex) => {
                enemy.update();

                // Sjekk Game Over (UFO treffer Robot)
                if (player.x < enemy.x + enemy.width/2 &&
                    player.x + player.width/2 > enemy.x &&
                    player.y < enemy.y + enemy.height/2 &&
                    player.y + player.height/2 > enemy.y) {
                        cancelAnimationFrame(animationId);
                        alert("FORSVAR MISLYKTES! UFOene overvant roboten din. Poeng: " + score);
                }

                projectiles.forEach((projectile, projectileIndex) => {
                    // Sjekk om kule treffer UFO
                    const dist = Math.hypot(projectile.x - enemy.x, projectile.y - enemy.y);
                    if (dist - enemy.width/2 - projectile.width/2 < 1) {
                        setTimeout(() => {
                            enemies.splice(enemyIndex, 1);
                            projectiles.splice(projectileIndex, 1);
                            score += 100;
                            scoreElement.innerHTML = score;
                        }, 0);
                    }
                });
            });
        }

        window.addEventListener('mousedown', (event) => {
            const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            const speed = 12; // Justert fart
            const velocity = {
                x: Math.cos(angle) * speed,
                y: Math.sin(angle) * speed
            };
            
            // Kula spawner litt foran roboten (Vektormatematikk!)
            const bulletSpawnDistance = player.width / 1.5;
            const spawnX = player.x + Math.cos(angle) * bulletSpawnDistance;
            const spawnY = player.y + Math.sin(angle) * bulletSpawnDistance;

            // En rød, slank kule
            projectiles.push(new Projectile(spawnX, spawnY, 15, 30, '#ff3333', velocity));
        });

        // Start
        animate();
        spawnEnemies();

    </script>
</body>
</html>
