<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Robot vs UFOs - GitHub Project</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #010101; /* Dypeste svart */
            overflow: hidden;
            color: #00ffcc; /* Sci-fi cyan */
            font-family: 'Courier New', Courier, monospace; /* Kode-aktig font */
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
        }
        h2 { margin: 0 0 5px 0; font-size: 28px; text-transform: uppercase; letter-spacing: 3px; font-weight: bold;}
        p { margin: 0; font-size: 14px; color: #ccc;}
    </style>
</head>
<body>

    <div id="ui">
        <h2>Poeng: <span id="score">0</span></h2>
        <p>Bruk WASD for å flytte, KLIKK for å skyte</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let mouseX = 0;
        let mouseY = 0;

        // --- BAKGRUNN (STJERNER) ---
        const stars = [];
        for (let i = 0; i < 250; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2.5,
                opacity: Math.random()
            });
        }

        function drawBackground() {
            ctx.fillStyle = '#010101';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            stars.forEach(star => {
                ctx.globalAlpha = star.opacity;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;
        }


        // --- INPUT ---
        const keys = { w: false, a: false, s: false, d: false };

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true;
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false;
        });

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });


        // --- KLASSER (Nå med programmert grafikk) ---

        class Player {
            constructor(x, y, size, speed) {
                this.x = x;
                this.y = y;
                this.size = size; // Robotens radius
                this.speed = speed;
                this.angle = 0;
            }

            // --- HER TEGNES ROBOTEN ---
            draw() {
                this.angle = Math.atan2(mouseY - this.y, mouseX - this.x);

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle); // Roterer med musa
                
                // 1. Robotens Hovedkropp (Mørk grå metall)
                ctx.fillStyle = '#444';
                ctx.strokeStyle = '#222';
                ctx.lineWidth = 2;
                ctx.beginPath();
                // En åttekantet form
                ctx.moveTo(this.size * 0.8, 0);
                ctx.lineTo(this.size * 0.5, this.size * 0.5);
                ctx.lineTo(-this.size * 0.3, this.size * 0.8);
                ctx.lineTo(-this.size * 0.8, this.size * 0.3);
                ctx.lineTo(-this.size * 0.8, -this.size * 0.3);
                ctx.lineTo(-this.size * 0.3, -this.size * 0.8);
                ctx.lineTo(this.size * 0.5, -this.size * 0.5);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // 2. Glødende Power Core (Cyan)
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ffcc';
                ctx.fillStyle = '#00ffcc';
                ctx.beginPath();
                ctx.arc(0, 0, this.size * 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0; // Skrur av glød

                // 3. To Side-kanoner (Peker framover)
                ctx.fillStyle = '#666';
                ctx.fillRect(this.size * 0.4, this.size * 0.4, this.size * 0.5, this.size * 0.2);
                ctx.fillRect(this.size * 0.4, -this.size * 0.6, this.size * 0.5, this.size * 0.2);
                
                // 4. Neon-blå linjer på rustningen
                ctx.strokeStyle = '#00ffcc';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(this.size * 0.2, this.size * 0.3);
                ctx.lineTo(-this.size * 0.5, this.size * 0.3);
                ctx.moveTo(this.size * 0.2, -this.size * 0.3);
                ctx.lineTo(-this.size * 0.5, -this.size * 0.3);
                ctx.stroke();

                ctx.restore();
            }

            update() {
                if (keys.w && this.y > this.size) this.y -= this.speed;
                if (keys.s && this.y < canvas.height - this.size) this.y += this.speed;
                if (keys.a && this.x > this.size) this.x -= this.speed;
                if (keys.d && this.x < canvas.width - this.size) this.x += this.speed;
                this.draw();
            }
        }

        class Projectile {
            constructor(x, y, radius, velocity) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.velocity = velocity;
                this.angle = Math.atan2(velocity.y, velocity.x);
            }
            // --- HER TEGNES LASEREN ---
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Sterk glød-effekt
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff3333';
                
                // Laserens form (en spiss trekant)
                ctx.fillStyle = 'white'; // Hvit kjerne
                ctx.beginPath();
                ctx.moveTo(this.radius * 3, 0);
                ctx.lineTo(-this.radius, this.radius);
                ctx.lineTo(-this.radius, -this.radius);
                ctx.closePath();
                ctx.fill();
                
                // Ytre flammende rød farge
                ctx.fillStyle = '#ff3333';
                ctx.beginPath();
                ctx.moveTo(this.radius * 2.5, 0);
                ctx.lineTo(-this.radius * 1.5, this.radius * 1.5);
                ctx.lineTo(-this.radius * 1.5, -this.radius * 1.5);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }
            update() {
                this.draw();
                this.x += this.velocity.x;
                this.y += this.velocity.y;
            }
        }

        class Enemy {
            constructor(x, y, radius, speed) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.speed = speed;
                this.pulse = 0; // For å få lysene til å blinke
            }
            // --- HER TEGNES UFOEN ---
            draw() {
                this.pulse += 0.1;
                ctx.save();
                ctx.translate(this.x, this.y);

                // 1. UFOens metall-disk (Sølv)
                ctx.fillStyle = '#888';
                ctx.strokeStyle = '#555';
                ctx.lineWidth = 2;
                ctx.beginPath();
                // En flattrykt sirkel (ellipse)
                ctx.ellipse(0, 0, this.radius, this.radius * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // 2. Glødende Grønn Dome (Toppen av skipet)
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ff00';
                ctx.fillStyle = '#00ff00';
                ctx.beginPath();
                ctx.arc(0, -this.radius * 0.2, this.radius * 0.4, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // 3. Pulserende lys rundt kanten
                const numLights = 8;
                const pulseIntensity = Math.abs(Math.sin(this.pulse)); // Går fra 0 til 1
                for (let i = 0; i < numLights; i++) {
                    const lightAngle = (i / numLights) * Math.PI * 2;
                    const lx = Math.cos(lightAngle) * this.radius * 0.8;
                    const ly = Math.sin(lightAngle) * this.radius * 0.45;
                    
                    ctx.fillStyle = `rgba(255, ${Math.floor(255 * pulseIntensity)}, 0, 0.8)`; // Oransje/Gult
                    ctx.beginPath();
                    ctx.arc(lx, ly, this.radius * 0.1, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }
            update() {
                this.draw();
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(angle) * this.speed;
                this.y += Math.sin(angle) * this.speed;
            }
        }


        // --- SPILL OBJEKTER ---
        let player = new Player(canvas.width / 2, canvas.height / 2, 30, 7);
        let projectiles = [];
        let enemies = [];

        function spawnEnemies() {
            setInterval(() => {
                const radius = 35; 
                let enemyX, enemyY;
                if (Math.random() < 0.5) {
                    enemyX = Math.random() < 0.5 ? 0 - radius : canvas.width + radius;
                    enemyY = Math.random() * canvas.height;
                } else {
                    enemyX = Math.random() * canvas.width;
                    enemyY = Math.random() < 0.5 ? 0 - radius : canvas.height + radius;
                }
                const speed = Math.random() * (2.8 - 1.0) + 1.0;
                enemies.push(new Enemy(enemyX, enemyY, radius, speed));
            }, 1000); 
        }

        let animationId;
        function animate() {
            animationId = requestAnimationFrame(animate);
            drawBackground();
            ctx.fillStyle = 'rgba(1, 1, 1, 0.15)'; // Trail effekt
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            player.update();

            projectiles.forEach((projectile, index) => {
                projectile.update();
                if (projectile.x + projectile.radius * 3 < 0 || projectile.x - projectile.radius * 3 > canvas.width || 
                    projectile.y + projectile.radius * 3 < 0 || projectile.y - projectile.radius * 3 > canvas.height) {
                    setTimeout(() => projectiles.splice(index, 1), 0);
                }
            });

            enemies.forEach((enemy, enemyIndex) => {
                enemy.update();

                // Game Over
                const distPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (distPlayer - enemy.radius - player.size < 1) {
                        cancelAnimationFrame(animationId);
                        alert("FORSVAR MISLYKTES! Robotens power core er ødelagt. Din poengsum: " + score);
                        location.reload(); // Restarter spillet automatisk
                }

                projectiles.forEach((projectile, projectileIndex) => {
                    const dist = Math.hypot(projectile.x - enemy.x, projectile.y - enemy.y);
                    if (dist - enemy.radius - projectile.radius < 1) {
                        setTimeout(() => {
                            enemies.splice(enemyIndex, 1);
                            projectiles.splice(projectileIndex, 1);
                            score += 100;
                            scoreElement.innerHTML = score;
                        }, 0);
                    }
                });
            });
        }

        window.addEventListener('mousedown', (event) => {
            const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            const speed = 15;
            const velocity = { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed };
            
            // Kula spawner foran kanonene
            const spawnX = player.x + Math.cos(angle) * player.size * 0.9;
            const spawnY = player.y + Math.sin(angle) * player.size * 0.9;

            projectiles.push(new Projectile(spawnX, spawnY, 6, velocity));
        });

        // Start
        animate();
        spawnEnemies();

    </script>
</body>
</html>
