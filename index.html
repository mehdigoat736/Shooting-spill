<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cyber-Grid: Infinite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="start-screen" class="overlay">
        <h1 class="welcome-text">WELCOME</h1>
        <p>VELG VANSKELIGHETSGRAD:</p>
        <div class="btn-group">
            <button onclick="startGame(0.7)">EASY</button>
            <button onclick="startGame(1.0)">MEDIUM</button>
            <button onclick="startGame(1.5)">HARDCORE</button>
        </div>
    </div>

    <div id="death-screen" class="overlay hidden">
        <h1 class="fail-text">MISSION FAILED</h1>
        <p id="final-score">SCORE: 000000</p>
        <button class="retry-btn" onclick="resetGame()">TRY AGAIN</button>
    </div>

    <div id="ui" class="hidden">
        <div class="stat-box">SCORE: <span id="score">000000</span></div>
        <div class="stat-box">WAVE: <span id="wave">1</span></div>
        <div id="ultimate-status">ULTIMATE: READY</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="script.js" defer></script>
</body>
</html>
