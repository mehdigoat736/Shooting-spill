<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome Web Shooter</title>
    <style>
        /* CSS: Gjør at spillet dekker hele skjermen og ser "clean" ut */
        body {
            margin: 0;
            padding: 0;
            background-color: #111; /* Mørk, kul bakgrunn */
            overflow: hidden; /* Fjerner scrollbars */
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none; /* Sørger for at UI ikke blokkerer museklikk */
        }
    </style>
</head>
<body>

    <div id="ui">
        <h2>Poeng: <span id="score">0</span></h2>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // JAVASCRIPT: Her ligger hele spill-logikken
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // Gjør canvaset like stort som vinduet
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;

        // Spiller-klasse
        class Player {
            constructor(x, y, radius, color) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        // Kule-klasse
        class Projectile {
            constructor(x, y, radius, color, velocity) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.velocity = velocity;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                this.draw();
                this.x += this.velocity.x;
                this.y += this.velocity.y;
            }
        }

        // Fiende-klasse
        class Enemy {
            constructor(x, y, radius, color, velocity) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.velocity = velocity;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                this.draw();
                this.x += this.velocity.x;
                this.y += this.velocity.y;
            }
        }

        // Setter opp spilleren i midten
        const x = canvas.width / 2;
        const y = canvas.height / 2;
        let player = new Player(x, y, 15, '#00ffcc');
        
        let projectiles = [];
        let enemies = [];

        // Funksjon for å spawne fiender
        function spawnEnemies() {
            setInterval(() => {
                const radius = Math.random() * (30 - 10) + 10;
                let enemyX, enemyY;

                // Spawner fiender utenfor skjermen
                if (Math.random() < 0.5) {
                    enemyX = Math.random() < 0.5 ? 0 - radius : canvas.width + radius;
                    enemyY = Math.random() * canvas.height;
                } else {
                    enemyX = Math.random() * canvas.width;
                    enemyY = Math.random() < 0.5 ? 0 - radius : canvas.height + radius;
                }

                const color = `hsl(${Math.random() * 360}, 50%, 50%)`;
                
                // Regner ut vinkelen mot spilleren (matematikkmagi!)
                const angle = Math.atan2(canvas.height / 2 - enemyY, canvas.width / 2 - enemyX);
                const velocity = {
                    x: Math.cos(angle) * 1.5,
                    y: Math.sin(angle) * 1.5
                };

                enemies.push(new Enemy(enemyX, enemyY, radius, color, velocity));
            }, 1000); // Spawner en ny fiende hvert sekund
        }

        let animationId;
        // Hoved-loopen for spillet (kjører 60 ganger i sekundet)
        function animate() {
            animationId = requestAnimationFrame(animate);
            // Tegner en halvgjennomsiktig svart bakgrunn for å skape en "trail" effekt
            ctx.fillStyle = 'rgba(17, 17, 17, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            player.draw();

            // Oppdaterer alle kuler
            projectiles.forEach((projectile, index) => {
                projectile.update();

                // Fjerner kuler som går utenfor skjermen for å spare minne
                if (projectile.x + projectile.radius < 0 || 
                    projectile.x - projectile.radius > canvas.width || 
                    projectile.y + projectile.radius < 0 || 
                    projectile.y - projectile.radius > canvas.height) {
                    setTimeout(() => {
                        projectiles.splice(index, 1);
                    }, 0);
                }
            });

            // Oppdaterer fiender og sjekker kollisjon
            enemies.forEach((enemy, enemyIndex) => {
                enemy.update();

                // Sjekker om fienden treffer spilleren (Game Over)
                const distPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (distPlayer - enemy.radius - player.radius < 1) {
                    cancelAnimationFrame(animationId);
                    alert("GAME OVER! Du fikk " + score + " poeng. Last inn siden på nytt for å prøve igjen.");
                }

                // Sjekker om en kule treffer en fiende
                projectiles.forEach((projectile, projectileIndex) => {
                    const dist = Math.hypot(projectile.x - enemy.x, projectile.y - enemy.y);

                    // Når kula treffer fienden
                    if (dist - enemy.radius - projectile.radius < 1) {
                        setTimeout(() => {
                            enemies.splice(enemyIndex, 1);
                            projectiles.splice(projectileIndex, 1);
                            score += 10;
                            scoreElement.innerHTML = score;
                        }, 0);
                    }
                });
            });
        }

        // Lytter etter museklikk for å skyte
        window.addEventListener('mousedown', (event) => {
            const angle = Math.atan2(event.clientY - canvas.height / 2, event.clientX - canvas.width / 2);
            const velocity = {
                x: Math.cos(angle) * 7, // Farten på kula
                y: Math.sin(angle) * 7
            };
            // Legger til en ny kule i arrayen
            projectiles.push(new Projectile(canvas.width / 2, canvas.height / 2, 5, 'white', velocity));
        });

        // Start spillet
        animate();
        spawnEnemies();

    </script>
</body>
</html>
